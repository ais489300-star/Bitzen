name: Workflow 1 - Projects 1-5

on:
  schedule:
    # Runs daily at 2:30 AM UTC
    - cron: '30 2 * * *'
  workflow_dispatch:  # Allows manual trigger

jobs:
  run-projects:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        project: [project1, project2, project3, project4, project5]
      fail-fast: false  # Continue running other projects even if one fails
      max-parallel: 1   # Run projects one at a time in sequence
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install chromium
          playwright install-deps chromium

      - name: Run ${{ matrix.project }}
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          S3_BUCKET_NAME: ${{ secrets.S3_BUCKET_NAME }}
        run: |
          echo "Running ${{ matrix.project }}..."
          python -m ${{ matrix.project }}.main

      - name: Upload logs (if any)
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: ${{ matrix.project }}-logs
          path: |
            *.log
            temp_downloads/
          retention-days: 7
          if-no-files-found: ignore
